<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crónicas de Py-Terra</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* Diseño de Fantasía Clásica */
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Palatino', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .contenedor-juego {
            width: 90%;
            max-width: 600px;
            background: #2c2c2c;
            border: 4px double #ffd700;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-shadow: 2px 2px #ff0000;
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        #pantalla {
            background: #000;
            border: 2px inset #555;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            color: #00ff41; /* Color tipo terminal mística */
            font-family: monospace;
        }

        .interfaz {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stats {
            font-weight: bold;
            color: #ffd700;
        }

        /* 🔥 NUEVOS ESTILOS PARA STATS MEJORADAS */
        .panel-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 5px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: #2c2c2c;
            border-radius: 3px;
            border-left: 3px solid #ffd700;
        }

        .stat-label {
            color: #ffd700;
            font-weight: bold;
        }

        .stat-value {
            color: #00ff41;
            font-family: monospace;
        }

        /* Contenedor de botones mejorado */
        .botones-combate {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background: #4a0000;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 10px 20px;
            font-family: 'Palatino', serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }

        button:hover {
            background: #ffd700;
            color: #4a0000;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* 🔥 NUEVO: Botón especial para nuevo combate */
        .btn-nuevo-combate {
            background: #006400;
            grid-column: 1 / -1;
        }

        .btn-nuevo-combate:hover {
            background: #00ff00;
            color: #000;
        }
    </style>

    <py-config>
        [[fetch]]
        files = ["logica.py", "personajes.py"]
    </py-config>
</head>
<body>

    <div class="contenedor-juego">
        <h1>⚔️ CRÓNICAS DE PY-TERRA ⚔️</h1>

        <!-- 🔥 NUEVO: Panel de estadísticas mejorado -->
        <div class="panel-stats">
            <div class="stat-item">
                <span class="stat-label">❤️ Vida:</span>
                <span class="stat-value"><span id="vida-jugador">100</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">👹 Enemigo:</span>
                <span class="stat-value"><span id="vida-enemigo">50</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⭐ Nivel:</span>
                <span class="stat-value"><span id="nivel">1</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">✨ EXP:</span>
                <span class="stat-value"><span id="exp">0/100</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💰 Oro:</span>
                <span class="stat-value"><span id="oro">0</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🎒 Inventario:</span>
                <span class="stat-value"><span id="inventario">0 items</span></span>
            </div>
        </div>

        <div id="pantalla">
            <p id="historia">El reino está despertando... espera un momento...</p>
        </div>

        <!-- 🔥 MEJORADO: Botones de combate en grid -->
        <div class="botones-combate">
            <button py-click="atacar">⚔️ ATACAR</button>
            <button py-click="curar">🧪 CURAR</button>
            <button py-click="defender">🛡️ DEFENDER</button>
            <button py-click="nuevo_combate" class="btn-nuevo-combate">🔥 NUEVO COMBATE</button>
        </div>
    </div>

    <script type="py" src="logica.py" async></script>

</body>
</html>
