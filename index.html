<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crónicas de Py-Terra</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* Diseño de Fantasía Clásica */
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Palatino', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .contenedor-juego {
            width: 90%;
            max-width: 600px;
            background: #2c2c2c;
            border: 4px double #ffd700;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-shadow: 2px 2px #ff0000;
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        #pantalla {
            background: #000;
            border: 2px inset #555;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            color: #00ff41; /* Color tipo terminal mística */
            font-family: monospace;
        }

        .interfaz {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stats {
            font-weight: bold;
            color: #ffd700;
        }

        button {
            background: #4a0000;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 10px 20px;
            font-family: 'Palatino', serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffd700;
            color: #4a0000;
        }
    </style>

    <py-config>
        [[fetch]]
        files = ["logica.py", "personajes.py"]
    </py-config>
</head>
<body>

    <div class="contenedor-juego">
        <h1>⚔️ CRÓNICAS DE PY-TERRA ⚔️</h1>

        <div id="pantalla">
            <p id="historia">El reino está despertando... espera un momento...</p>
        </div>

        <div class="interfaz">
            <div class="stats">❤️ Vida: <span id="vida-jugador">100</span></div>
            <div class="stats">👹 Enemigo: <span id="vida-enemigo">50</span></div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <button py-click="atacar">ATACAR CON ESPADA</button>
            <button py-click="curar">USAR POCIÓN</button>
        </div>
    </div>

    <script type="py" src="logica.py" async></script>

</body>
</html>
